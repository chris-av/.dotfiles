windowrule {
  name = dolphin-float
  match:title = Dolphin$
  float = yes
}

windowrule {
  name = thunar-float
  match:initial_class = thunar
  float = yes
  rounding = 10
  size = 900 600
  move = "(monitor_w)*0.5" 10
}

windowrule {
  name = show-me-the-key
  match:class = .*showmethekey
  match:title = ^(Show Me The Key)$
}


windowrule {
  name = spotify
  match:initial_class = spotify
  rounding = 15
}

windowrule {
  name = rgraphics_device
  match:initial_class = ^(R_x11)$
  rounding = 10
}

# quickshell
layerrule {
    name            = quickshell-sidebar
    match:namespace = quickshell
    blur            = on
    ignore_alpha    = 0.1
    xray            = on
}

layerrule {
    name            = sidebar-logic
    match:namespace = quickshell-sidebar
    blur            = on
    ignore_alpha    = 0.1
    xray            = on
    animation       = slide right
}

layerrule {
    name            = topbar-glass
    match:namespace = quickshell-topbar
    blur            = on
    ignore_alpha    = 0.5
    xray            = on
    animation       = slide top
}

layerrule {
    name            = keybinds-glass
    match:namespace = quickshell-keybinds
    blur            = on
    ignore_alpha    = 0.5
    xray            = on
}
